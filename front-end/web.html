<!DOCTYPE html>
<html>
    <head>
        <title>Lichess Analysis</title>

        <link rel = "stylesheet" href="stylesheet.css">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name = "author" content = "Leina85">
        <meta name = "description" content = "A website that analyzes chess games from Lichess.org">
        <meta name = "keywords" content = "chess, lichess, analysis, chess games">
    </head>

    <body>
        <h1>Lichess Analysis</h1>
        <h2>May 2013</h2>

        <p>Created by <a href="https://github.com/Leina85">Leina85</a></p>
    
        <img src = "/Users/madaleine/Coding/Practice-Projects/Lichess-Analysis/assets/230416692_8050a90a5a_o.jpg" alt = "chess" width = "600">
        <p class="attribution">"<a rel="noopener noreferrer" href="https://www.flickr.com/photos/24046097@N00/230416692">Chess</a>" by <a rel="noopener noreferrer" href="https://www.flickr.com/photos/24046097@N00">romainguy</a> is marked with <a rel="noopener noreferrer" href="https://creativecommons.org/publicdomain/zero/1.0/?ref=openverse">CC0 1.0 <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" style="height: 1em; margin-right: 0.125em; display: inline;" /><img src="https://mirrors.creativecommons.org/presskit/icons/zero.svg" style="height: 1em; margin-right: 0.125em; display: inline;" /></a>.</p>

        <form>
            <input type="checkbox" id="show-win-stats">
            <label for="show-win-stats"> View winner stats</label><br>
            <input type="checkbox" id="show-eco-stats">
            <label for="show-eco-stats"> View ECO stats</label><br>
            <input type="checkbox" id="show-opening-stats">
            <label for="show-opening-stats"> View opening stats</label><br>
            <input type="checkbox" id="show-termination-stats">
            <label for="show-termination-stats"> View termination stats</label><br>
            <input type="checkbox" id="show-moves-stats">
            <label for="show-moves-stats"> View number of moves</label><br>
            <br>
            <input type="submit" value="Submit">
        </form>

        <div id = "stats">

        <!-- WINNER STATS -->
        <section id="winner-section" class="hidden">
            <h3>Winner Stats</h3>

            <div class="stacked-bar">
                <div id="white-bar"></div>
                <div id="black-bar"></div>
                <div id="draw-bar"></div>
            </div>

            <ul id="winner-list"></ul>
        </section>

        <!-- ECO STATS -->
        <section id="eco-section" class="hidden">
            <h3>Top ECO Codes</h3>
            <ol id="eco-list"></ol>
        </section>

        <!-- OPENING STATS -->
        <section id="opening-section" class="hidden">
            <h3>Top Openings</h3>
            <ol id="opening-list"></ol>
        </section>

        <!-- TERMINATION STATS -->
        <section id="termination-section" class="hidden">
            <h3>Termination Stats</h3>

            <div class="stacked-bar">
                <div id="time-forfeit-bar"></div>
                <div id="normal-bar"></div>
                <div id="abandoned-bar"></div>
                <div id="rules-violation-bar"></div>
            </div>

            <ul id="termination-list"></ul>
        </section>

        <!-- MOVE STATS -->
        <section id="moves-section" class="hidden">
            <h3>Move Stats</h3>

            <p id="average-moves"></p>
        </section>

    </div>

        <script src="script.js"> </script>
    </body>
</html>
